<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    #map { position: absolute; top: 0; bottom: 0; right: 0; left: 0 }
  </style>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content= "IE-edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realm's Atlas</title>
</head>
<body>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([0,0], 1);

    // L.imageOverlay('test.jpg', [[0, 0], [8192, 5301]]).addTo(map);

    // Crear un TileLayer personalizado
    var CustomTileLayer = L.TileLayer.extend({
      createTile: function (coords) {
        var tile = document.createElement('canvas');
        var ctx = tile.getContext('2d');

        // Dimensiones del tile
        var tileSize = this.options.tileSize;
        tile.width = tileSize;
        tile.height = tileSize;

        var img = new Image();
        img.src = 'test.jpg'; // Tu imagen base
        img.onload = function () {
          // Calcular el área de la imagen que corresponde a este tile
          var x = coords.x * tileSize;
          var y = coords.y * tileSize;

          // Dibujar la sección de la imagen en el canvas del tile
          ctx.drawImage(img, x, y, tileSize, tileSize, 0, 0, tileSize, tileSize);
        };

        return tile;
      }
    });

    // Agregar el TileLayer al mapa
    var customLayer = new CustomTileLayer('', {
      tileSize: 256, // Tamaño de cada tile
      maxZoom: 5 // Zoom máximo
    }).addTo(map);
  </script>
</body>
</html>
