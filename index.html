<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Page</title>
  <!-- Enlace a la hoja de estilos de Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <!-- Enlace al script de Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h1>Welcome to My Page!</h1>
  <p>This is my custom web page hosted on GitHub Pages.</p>
  <div id="map" style="height: 500px;"></div>
  
  <script>
  // Crear el mapa centrado en una ubicación (lat, lon) y con un nivel de zoom
  var map = L.map('map').setView([51.505, -0.09], 13);

  // Cargar el tile layer de OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  }).addTo(map);
</script>
</body>
</html>
