<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recorte Dinámico de Imagen con Leaflet</title>
  <!-- Incluir la hoja de estilos de Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    /* Establecer el tamaño del mapa */
    #map {
      width: 100%;
      height: 600px;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  
  <!-- Incluir la librería de Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tilelayer-xyz/1.0.0/tilelayer-xyz.min.js"></script>
  <script>
    // Crear el mapa
    const map = L.map('map').setView([0, 0], 2);

    // Función para cortar la imagen en tiles
    function createImageTiles(imageUrl, tileSize) {
      const image = new Image();
      image.src = imageUrl;

      image.onload = function() {
        const cols = Math.ceil(image.width / tileSize);
        const rows = Math.ceil(image.height / tileSize);

        // Crear una capa de tiles personalizados
        const tileLayer = L.tileLayer('', {
          minZoom: 0,
          maxZoom: Math.max(cols, rows),
          tileSize: tileSize,
          bounds: [[0, 0], [image.height, image.width]],
          tileUrl: function(coords) {
            const x = coords.x % cols;
            const y = coords.y % rows;

            return `${imageUrl}?x=${x}&y=${y}&z=${coords.z}`;
          }
        });

        tileLayer.addTo(map);
      };
    }

    // Llamar a la función para cortar la imagen en tiles
    createImageTiles('https://static.wikia.nocookie.net/forgottenrealms/images/8/82/ScnMap.png', 256);
  </script>
</body>
</html>
